services:

  # ===== WeatherOps Backend =====
  weatherops:
    build:
      context: .
      dockerfile: Dockerfile
    image: weatherops:latest
    container_name: weatherops_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo}
      - DB_PATH=/app/data/weatherops.db
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - weatherops_data:/app/data
    networks:
      - weatherops_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:1.25-alpine
    container_name: weatherops_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      weatherops:
        condition: service_healthy
    networks:
      - weatherops_net

  # ===== Jenkins CI/CD =====
  jenkins:
    image: jenkins/jenkins:lts
    container_name: weatherops_jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_data:/var/jenkins_home
      - //var/run/docker.sock:/var/run/docker.sock
    networks:
      - weatherops_net

volumes:
  weatherops_data:
    driver: local
  jenkins_data:
    driver: local

networks:
  weatherops_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/16
